location.href).then(()=>toast("Pautan disalin"),()=>toast("Pautan sedia untuk disalin"))}async function sharePage(){if(navigator.share){try{await navigator.share({title:document.title,url:location.href});return}catch(e){}}copyCurrentLink()}function toast(m){const t=document.getElementById("toast");if(!t)return;t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)}function codeNum(c){return Number(String(c).replace(/\D/g,""))}function seat(code){return state.data.find(d=>d.code===String(code||"").toUpperCase())}function coalitionBadge(c){return`<span class="badge ${String(c).toLowerCase()}">${escapeHTML(c||"OTHER")}</span>`}function riskBadge(r){return`<span class="badge ${escapeHTML(r)}">${escapeHTML(getRiskLabel(r))}</span>`}function projectionDisclaimer(){return`<div class="empty"><strong>Nota unjuran.</strong> Unjuran ini bukan keputusan rasmi Suruhanjaya Pilihan Raya. Angka boleh berubah berdasarkan calon, kadar keluar mengundi, kerjasama parti, isu tempatan dan sentimen semasa. ${election2026.dateStatus==="andaian"?`Tarikh andaian: ${escapeHTML(election2026.date)}.`:""}</div>`}function getCoalition(d,y=state.year){return y==="2026"?d.projection2026.winnerCoalition||"OTHER":y==="2018"?d.result2018?.winner?.coalition||"OTHER":d.result2022?.winner?.coalition||"OTHER"}function getParty(d,y=state.year){return y==="2026"?d.projection2026.winnerParty||"":y==="2018"?d.result2018?.winner?.party||"":d.result2022?.winner?.party||""}function getWinner(d,y=state.year){return y==="2026"?"Unjuran baseline":d[y==="2018"?"result2018":"result2022"]?.winner?.name||"Data belum tersedia"}
function calculateComposition(y=state.year){if(y==="2018")return{...historicalComposition["2018"]};const c={BN:0,PH:0,PN:0,MUDA:0,OTHER:0};state.data.forEach(d=>c[getCoalition(d,y)]++);return c}function calculateSeatChange(f,t){const a=calculateComposition(f),b=calculateComposition(t),o={};COALITIONS.forEach(k=>o[k]=(b[k]||0)-(a[k]||0));return o}function calculateSeatChanges(){return{from2018To2022:calculateSeatChange("2018","2022"),from2022To2026:calculateSeatChange("2022","2026")}}function calculateKPIs(y=state.year){const c=calculateComposition(y),big=COALITIONS.map(k=>[k,c[k]||0]).sort((a,b)=>b[1]-a[1])[0],m=state.data.filter(d=>["too-close","marginal"].includes(d.projection2026.risk)).length,tc=state.data.filter(d=>d.projection2026.risk==="too-close").length,ch=state.data.filter(d=>d.changedHands).length,pot=state.data.filter(d=>["too-close","marginal"].includes(d.projection2026.risk)&&d.result2022.winner.coalition!=="BN").length;if(y==="2026")return[{value:`${big[0]} ${big[1]}`,label:"UNJURAN ASAS",note:"Berdasarkan 56 DUN",color:getCoalitionColor(big[0])},{value:`BN ${analystOutlook.bnRange}`,label:"JULAT PENGANALISIS",note:"Senario kerusi marginal",color:"var(--projection)"},{value:tc,label:"Kerusi terlalu rapat",note:"Majoriti 500 ke bawah",color:"var(--too-close)"},{value:m,label:"Kerusi marginal",note:"Termasuk terlalu rapat",color:"var(--marginal)"},{value:pot,label:"Potensi pertukaran tangan",note:"Bukan BN dalam zon risiko",color:"var(--projection)"}];return[{value:state.data.length,label:"Jumlah DUN",note:"Kerusi Dewan Negeri Johor",color:"var(--text-primary)"},{value:29,label:"Majoriti mudah",note:"Ambang pembentukan kerajaan",color:"var(--projection)"},{value:big[1],label:`${big[0]} — gabungan terbesar`,note:y==="2018"?"Komposisi sejarah":"Dikira daripada dataset",color:getCoalitionColor(big[0])},{value:m,label:"Kerusi marginal",note:"Berdasarkan majoriti 2022",color:"var(--marginal)"},{value:ch,label:"Bertukar tangan sejak 2018",note:"Berdasarkan incumbent sumber 2022",color:"var(--too-close)"}]}
function filterDun(){const q=state.search.trim().toLowerCase();return state.data.filter(d=>{const r=state.year==="2026"?d.projection2026.risk:getRiskLevel(d.result2022.majority),hay=[d.code,d.name,d.result2022.winner?.name,d.result2022.runnerUp?.name,d.result2018?.winner?.name].join(" ").toLowerCase();return(state.coalition==="ALL"||getCoalition(d,state.year)===state.coalition)&&(state.risk==="ALL"||r===state.risk)&&(!state.changedHands||d.changedHands)&&(!q||hay.includes(q))})}function sortDun(a){const s=[...a],name=(x,y)=>x.name.localeCompare(y.name,"ms"),map={CODE:(x,y)=>codeNum(x.code)-codeNum(y.code),MAJORITY_ASC:(x,y)=>(x.result2022.majority??999999)-(y.result2022.majority??999999),MAJORITY_DESC:(x,y)=>(y.result2022.majority??-1)-(x.result2022.majority??-1),PARTY:(x,y)=>getCoalition(x).localeCompare(getCoalition(y))||name(x,y),RISK:(x,y)=>RISKS.indexOf(x.projection2026.risk)-RISKS.indexOf(y.projection2026.risk)||name(x,y),NAME:name};return s.sort(map[state.sort]||map.CODE)}function validateData(data){const errors=[],warnings=[],codes=new Set,slugs=new Set;if(data.length!==56)errors.push(`Jumlah DUN ialah ${data.length}, bukan 56.`);data.forEach((d,i)=>{const exp=`N${String(i+1).padStart(2,"0")}`;if(d.code!==exp)errors.push(`${d.code} tidak mengikut turutan ${exp}.`);if(codes.has(d.code))errors.push(`${d.code} berulang.`);codes.add(d.code);if(!d.name)errors.push(`${d.code} tiada nama.`);if(slugs.has(d.slug))errors.push(`${d.code} slug berulang.`);slugs.add(d.slug);const w=d.result2022?.winner,r=d.result2022?.runnerUp;if(!w?.party)errors.push(`${d.code} pemenang tiada parti.`);if(!Number.isFinite(Number(w?.votes)))errors.push(`${d.code} undi pemenang bukan nombor.`);if(r&&Math.abs(Number(w.votes)-Number(r.votes))!==Number(d.result2022.majority))errors.push(`${d.code} majoriti tidak sepadan.`);if(!d.result2018?.winner?.coalition)warnings.push(`${d.code} data penuh 2018 belum tersedia; paparan 2018 menggunakan empty state.`)});["2022","2026"].forEach(y=>{const c=calculateComposition(y),t=COALITIONS.reduce((s,k)=>s+(c[k]||0),0);if(t!==56)errors.push(`Jumlah komposisi ${y} ialah ${t}, bukan 56.`)});return{errors,warnings}}
function nav(){return`<header class="topbar"><div class="container nav-inner"><a class="brand" href="#dashboard"><span class="brand-mark">JM</span><span><span class="brand-name">J-MATRIX</span><span class="brand-sub">Johor Election Intelligence</span></span></a><button class="mobile-menu btn" data-action="menu" aria-expanded="false">Menu</button><nav class="nav-actions" id="nav-actions" aria-label="Navigasi utama"><a class="nav-link" href="#dashboard" aria-current="${state.route==="dashboard"?"page":"false"}">Dashboard</a><a class="nav-link" href="#matrix">Semua DUN</a><a class="nav-link" href="#battlefield">Medan Perang</a><a class="nav-link" href="#methodology">Metodologi</a><button class="btn" data-action="theme">${state.theme==="dark"?"Tema terang":"Tema gelap"}</button><button class="btn" data-action="print">Cetak</button></nav></div></header>`}function metaBar(){return`<div class="container meta-bar"><span>Kemaskini terakhir: <strong>${formatDate(dashboardMeta.lastUpdated)}</strong></span><span>Status data: <strong>${escapeHTML(dashboardMeta.sourceStatus)}</strong></span><span>Keputusan rasmi: <strong>SPR</strong></span><span>Unjuran 2026: <strong>${escapeHTML(dashboardMeta.projectionSource)}</strong></span></div>`}function yearSwitcher(){return`<div class="year-switcher" role="group" aria-label="Pilih tahun">${["2018","2022","2026"].map(y=>`<button class="year-btn" data-year="${y}" aria-pressed="${state.year===y}">${y}<span>${y==="2026"?"UNJURAN":"Keputusan"}</span></button>`).join("")}</div>`}function renderDashboardHeader(){return`<section class="hero"><div class="container hero-grid"><div><div class="eyebrow">J-MATRIX · JOHOR ELECTION INTELLIGENCE</div><h1>Peta Kuasa PRN Johor</h1><p class="hero-copy">Analisis 56 kerusi DUN bagi pilihan raya 2018, keputusan 2022 dan unjuran asas 2026.</p></div>${yearSwitcher()}</div></section>${metaBar()}`}
function renderKPIs(){return`<section class="section container"><div class="section-head"><div><h2>KPI Utama</h2><p class="kicker">${state.year==="2026"?"Unjuran asas dipisahkan daripada julat penganalisis.":"Dikira daripada dataset apabila data tersedia."}</p></div></div><div class="grid kpi-grid">${calculateKPIs().map(k=>`<article class="card kpi" style="--accent:${k.color}"><div class="kpi-value">${escapeHTML(String(k.value))}</div><div class="kpi-label">${escapeHTML(k.label)}</div><div class="kpi-note">${escapeHTML(k.note)}</div></article>`).join("")}</div></section>`}function renderComparison(){const years=["2018","2022","2026"],comps=Object.fromEntries(years.map(y=>[y,calculateComposition(y)])),chg=calculateSeatChanges().from2018To2022;return`<h2>Perubahan Peta Kuasa</h2><p class="kicker">2018 ialah metadata komposisi; 2022 dan 2026 dikira daripada 56 DUN.</p><table><thead><tr><th>Gabungan</th><th class="num">2018</th><th class="num">2022</th><th class="num">2026</th></tr></thead><tbody>${COALITIONS.map(k=>`<tr><td>${k}</td><td class="num">${comps[2018]?.[k]||0}</td><td class="num">${comps[2022]?.[k]||0}</td><td class="num">${comps[2026]?.[k]||0}</td></tr>`).join("")}</tbody></table><div class="summary-list"><div class="summary-item"><span>BN berbanding 2018</span><strong>${chg.BN>=0?"+":""}${chg.BN}</strong></div><div class="summary-item"><span>PH berbanding 2018</span><strong>${chg.PH>=0?"+":""}${chg.PH}</strong></div><div class="summary-item"><span>Kerusi zon persaingan</span><strong>${state.data.filter(d=>["too-close","marginal"].includes(d.projection2026.risk)).length}</strong></div></div>`}function renderComposition(){const c=calculateComposition(),total=COALITIONS.reduce((s,k)=>s+(c[k]||0),0)||56;return`<section class="section container"><div class="composition-layout"><article class="card pad"><h2>Komposisi Kerusi</h2><p class="kicker">Jumlah ${total} kerusi. Garis majoriti mudah: 29 kerusi.</p><div class="stacked-bar">${COALITIONS.filter(k=>c[k]).map(k=>`<div class="bar-seg" style="width:${c[k]/total*100}%;background:${getCoalitionColor(k)}">${k} ${c[k]}</div>`).join("")}<span class="majority-marker"></span></div><div class="legend">${COALITIONS.map(k=>`<span class="legend-item"><span class="swatch" style="--c:${getCoalitionColor(k)}"></span>${k} ${c[k]||0}</span>`).join("")}</div>${state.year==="2026"?`<p class="kicker">${escapeHTML(analystOutlook.rangeNote)}</p>`:""}</article><article class="card pad">${renderComparison()}</article></div></section>`}
function renderFilters(){return`<section class="section container" id="matrix"><div class="section-head"><div><h2>Matriks 56 Kerusi DUN</h2><p class="kicker">Cari, tapis dan buka micropage lengkap setiap DUN.</p></div><div id="result-count" class="result-count" aria-live="polite">${filterDun().length} daripada ${state.data.length} DUN dipaparkan</div></div><div class="panel filter-panel"><div class="filter-row"><input class="search" data-search type="search" value="${escapeHTML(state.search)}" placeholder="Cari nama DUN, kod atau calon"><select class="select" data-coalition><option value="ALL">Semua gabungan</option>${COALITIONS.map(k=>`<option value="${k}" ${state.coalition===k?"selected":""}>${k}</option>`).join("")}</select><select class="select" data-risk><option value="ALL">Semua risiko</option>${RISKS.map(k=>`<option value="${k}" ${state.risk===k?"selected":""}>${getRiskLabel(k)}</option>`).join("")}</select><select class="select" data-sort><option value="CODE">Kod DUN</option><option value="MAJORITY_ASC" ${state.sort==="MAJORITY_ASC"?"selected":""}>Majoriti terkecil</option><option value="MAJORITY_DESC" ${state.sort==="MAJORITY_DESC"?"selected":""}>Majoriti terbesar</option><option value="PARTY" ${state.sort==="PARTY"?"selected":""}>Parti</option><option value="RISK" ${state.sort==="RISK"?"selected":""}>Tahap risiko</option><option value="NAME" ${state.sort==="NAME"?"selected":""}>Nama DUN</option></select><button class="btn" data-action="clear">Reset</button></div></div></section>`}function seatCards(items){if(!items.length)return createEmptyState("Tiada DUN sepadan dengan filter semasa.");return items.map(d=>{const c=getCoalition(d),r=state.year==="2026"?d.projection2026.risk:getRiskLevel(d.result2022.majority),maj=state.year==="2026"?d.projection2026.estimatedMajorityLabel:`Majoriti ${formatNumber(d.result2022.majority)}`;return`<button class="card seat-card" data-dun-code="${d.code}" style="--coalition-color:${getCoalitionColor(c)}"><span class="seat-code">${d.code}</span><span class="seat-name">${escapeHTML(d.name)}</span><span>${coalitionBadge(c)} <span class="badge">${escapeHTML(getParty(d)||"Data belum tersedia")}</span></span><span class="seat-candidate">${escapeHTML(getWinner(d))}</span><span class="seat-code">${escapeHTML(maj)}</span><span class="seat-meta">${riskBadge(r)}${d.changedHands?`<span class="badge projection">BERTUKAR TANGAN</span>`:""}</span></button>`}).join("")}function selectedSummary(d){if(!d)return createEmptyState("Pilih satu DUN untuk melihat ringkasan.");return`<h3>${d.code} ${escapeHTML(d.name)}</h3><div class="summary-list"><div class="summary-item"><span>Pemenang 2022</span><strong>${escapeHTML(d.result2022.winner.name)}</strong></div><div class="summary-item"><span>Gabungan</span><strong>${coalitionBadge(getCoalition(d))}</strong></div><div class="summary-item"><span>Majoriti 2022</span><strong>${formatNumber(d.result2022.majority)}</strong></div><div class="summary-item"><span>Risiko</span><strong>${riskBadge(d.projection2026.risk)}</strong></div><div class="summary-item"><span>Pengundi berdaftar</span><strong>${formatNumber(d.demographics.totalVoters)}</strong></div></div><button class="pill" data-dun-code="${d.code}">Buka micropage</button>`}function renderSeatMatrix(){const f=sortDun(filterDun()),first=f[0];return`<section class="container dashboard-layout"><div id="seat-matrix-grid" class="seat-grid">${seatCards(f)}</div><aside class="panel summary-panel" id="selected-summary">${selectedSummary(first)}</aside></section>`}function battlefieldSeats(){return state.data.filter(d=>d.result2022.majority<2000||["marginal","too-close"].includes(d.projection2026.risk)||d.projection2026.confidence==="rendah").sort((a,b)=>a.result2022.majority-b.result2022.majority)}function renderBattlefield(){return`<section class="section container" id="battlefield"><div class="section-head"><div><h2>Medan Perang 2026</h2><p class="kicker">Kerusi majoriti bawah 2,000 atau keyakinan rendah.</p></div></div><article class="card pad"><table class="responsive"><thead><tr><th>DUN</th><th>Pemenang 2022</th><th class="num">Majoriti</th><th>Unjuran 2026</th><th>Anggaran</th><th>Risiko</th><th>Catatan</th></tr></thead><tbody>${battlefieldSeats().map(d=>`<tr class="battle-row" data-dun-code="${d.code}"><td data-label="DUN"><strong>${d.code} ${escapeHTML(d.name)}</strong></td><td data-label="Pemenang 2022">${d.result2022.winner.coalition} · ${d.result2022.winner.party}</td><td data-label="Majoriti" class="num">${formatNumber(d.result2022.majority)}</td><td data-label="Unjuran">${d.projection2026.winnerCoalition} · ${d.projection2026.winnerParty}</td><td data-label="Anggaran">${escapeHTML(d.projection2026.estimatedMajorityLabel)}</td><td data-label="Risiko">${riskBadge(d.projection2026.risk)}</td><td data-label="Catatan">${escapeHTML(d.projection2026.category)}</td></tr>`).join("")}</tbody></table></article></section>`}function renderInsights(){const s=[...state.data].sort((a,b)=>a.result2022.majority-b.result2022.majority),ph=state.data.filter(d=>d.result2022.winner.coalition==="PH").sort((a,b)=>b.result2022.majority-a.result2022.majority)[0],bn=state.data.filter(d=>d.result2022.winner.coalition==="BN").sort((a,b)=>b.result2022.majority-a.result2022.majority)[0];return`<section class="section container"><h2>Insight Strategik</h2><div class="grid insight-grid"><article class="card insight"><span class="badge marginal">Kerusi Paling Marginal</span><strong>${s[0].code} ${escapeHTML(s[0].name)}</strong><p>Majoriti ${formatNumber(s[0].result2022.majority)} undi.</p></article><article class="card insight"><span class="badge ph">Kubu PH</span><strong>${ph.code} ${escapeHTML(ph.name)}</strong><p>Majoriti ${formatNumber(ph.result2022.majority)} undi.</p></article><article class="card insight"><span class="badge bn">Kubu BN</span><strong>${bn.code} ${escapeHTML(bn.name)}</strong><p>Majoriti ${formatNumber(bn.result2022.majority)} undi.</p></article><article class="card insight"><span class="badge projection">Risiko 2026</span><strong>${battlefieldSeats().length} kerusi perhatian</strong><p>Perubahan kecil turnout dan calon boleh mengubah beberapa kerusi marginal.</p></article></div></section>`}function renderMethodology(){const v=window.__JMATRIX_VALIDATION__||{errors:[],warnings:[]};return`<section class="section container" id="methodology"><article class="card pad"><h2>Metodologi dan Sumber</h2><p class="kicker">Data 2022 diekstrak daripada sumber keputusan awam. Medan tanpa sumber disediakan sebagai empty state, bukan angka rekaan.</p><div class="print-meta">Tarikh cetakan: ${formatDate(new Date().toISOString().slice(0,10))}. Status data: ${escapeHTML(dashboardMeta.sourceStatus)}. Unjuran 2026 bukan keputusan rasmi.</div><div class="summary-list"><div class="summary-item"><span>Validasi data</span><strong>${v.errors.length?`${v.errors.length} error`:"Tiada error kritikal"}</strong></div><div class="summary-item"><span>Amaran data</span><strong>${v.warnings.length}</strong></div><div class="summary-item"><span>Percanggahan utama</span><strong>Fail /mnt/data asal tidak tersedia dalam persekitaran ini</strong></div></div>${projectionDisclaimer()}</article></section>`}function renderDashboard(){return`${renderDashboardHeader()}${renderKPIs()}${renderComposition()}${renderFilters()}${renderSeatMatrix()}${renderBattlefield()}${renderInsights()}${renderMethodology()}<footer class="footer container">J-MATRIX · Johor Election Intelligence Dashboard</footer>`}
function generateExecutiveSummary(d){const m=d.result2022.majority,r=d.projection2026.risk,w=`${d.result2022.winner.coalition} · ${d.result2022.winner.party}`,p=`${d.projection2026.winnerCoalition} · ${d.projection2026.winnerParty}`,ch=d.changedHands?"Kerusi ini direkodkan bertukar tangan berbanding incumbent sumber 2022.":"Tiada petunjuk pertukaran tangan daripada medan incumbent sumber 2022.";if(r==="too-close")return`${d.name} ialah kerusi terlalu rapat dengan majoriti 2022 hanya ${formatNumber(m)} undi. ${w} memegang kerusi ini, sementara unjuran asas 2026 masih meletakkan ${p} sebagai rujukan awal. ${ch} Perubahan kecil pada turnout, calon dan pemindahan undi boleh mengubah keputusan.`;if(r==="marginal")return`${d.name} berada dalam zon marginal dengan majoriti ${formatNumber(m)} undi. Pemenang 2022 ialah ${w}, dan unjuran asas 2026 belum menunjukkan pertukaran gabungan. ${ch}`;if(r==="competitive")return`${d.name} ialah kerusi kompetitif dengan majoriti ${formatNumber(m)} undi. ${w} mempunyai kelebihan, tetapi margin masih cukup rendah untuk berubah jika berlaku ayunan tempatan.`;return`${d.name} dikategorikan sebagai kerusi selamat berdasarkan majoriti 2022 sebanyak ${formatNumber(m)} undi. ${w} mempunyai kedudukan relatif kukuh, namun unjuran 2026 masih perlu disahkan.`}
function renderDunMicropage(code){const d=seat(code);if(!d)return createEmptyState("Kod DUN tidak sah.");const prev=state.data[codeNum(d.code)-2],next=state.data[codeNum(d.code)],r=d.projection2026.risk;return`<div class="container breadcrumb"><a href="#dashboard">Dashboard</a><span>/</span><a href="#matrix">Semua DUN</a><span>/</span><strong>${d.code} ${escapeHTML(d.name)}</strong></div><section class="container card dun-hero"><div><div>${coalitionBadge(d.result2022.winner.coalition)} ${riskBadge(r)}</div><h1>${d.code} · ${escapeHTML(d.name)}</h1><p class="hero-copy">${escapeHTML(r==="too-close"?"Kerusi paling marginal dalam radar Johor":d.projection2026.category)} · Johor</p><div class="breadcrumb"><button class="pill" data-action="back">← Kembali ke Papan 56 DUN</button><button class="pill" data-action="copy">Salin Pautan</button><button class="pill" data-action="share">Kongsi</button><select class="select" data-seat-select>${state.data.map(x=>`<option value="${x.code}" ${x.code===d.code?"selected":""}>${x.code} ${escapeHTML(x.name)}</option>`).join("")}</select></div></div><div class="hero-facts"><div class="fact"><span>Pemenang 2022</span><strong>${escapeHTML(d.result2022.winner.name)}</strong><p>${d.result2022.winner.coalition} · ${d.result2022.winner.party}</p></div><div class="fact"><span>Majoriti</span><strong>${formatNumber(d.result2022.majority)} undi</strong></div><div class="fact"><span>Unjuran 2026</span><strong>${d.projection2026.winnerCoalition} · ${d.projection2026.winnerParty}</strong></div><div class="fact"><span>Kemaskini</span><strong>${formatDate(d.lastUpdated)}</strong></div></div></section><section class="section container grid mini-kpis">${renderMicropageKPIs(d)}</section><section class="section container micropage-grid"><div class="stack"><article class="card pad"><h2>Ringkasan Eksekutif</h2><p>${escapeHTML(generateExecutiveSummary(d))}</p></article>${renderElectionTimeline(d)}${renderVoteComparison(d)}${render2026Analysis(d)}${renderCandidateProfiles(d)}${renderDemographics(d)}${renderLocalIssues(d)}${renderPollingDistricts(d)}${renderMap(d)}${renderGroundAssessment(d)}${renderNews(d)}${renderMediaGallery(d)}${renderSources(d)}</div><aside class="side-nav"><article class="panel pad"><h3>Navigasi DUN</h3><div class="prev-next">${prev?`<a class="pill" href="#dun/${prev.code}">← ${prev.code}</a>`:`<span></span>`}<strong>${d.code}</strong>${next?`<a class="pill" href="#dun/${next.code}">${next.code} →</a>`:`<span></span>`}</div></article>${projectionDisclaimer()}</aside></section><div class="bottom-bar"><a class="pill" href="#dashboard">← Dashboard</a><button class="pill" data-action="share">Kongsi</button>${next?`<a class="pill" href="#dun/${next.code}">${next.code} →</a>`:`<span class="pill">Tamat</span>`}</div>`}
function renderMicropageKPIs(d){const r=d.result2022.runnerUp,k=[[`${d.result2022.winner.coalition} · ${d.result2022.winner.party}`,"Pemenang 2022"],[formatNumber(d.result2022.majority),"Majoriti"],[formatNumber(d.result2022.winner.votes),"Undi pemenang"],[formatNumber(r?.votes),"Undi pencabar utama"],[d.projection2026.estimatedMajorityLabel,"Anggaran 2026"],[getRiskLabel(d.projection2026.risk),"Tahap risiko"]];return k.map(x=>`<article class="card kpi"><div class="kpi-value">${escapeHTML(x[0])}</div><div class="kpi-label">${escapeHTML(x[1])}</div></article>`).join("")}function renderElectionTimeline(d){const r18=d.result2018,r22=d.result2022,p=d.projection2026;return`<article class="card pad"><h2>Prestasi Pilihan Raya</h2><div class="timeline"><div class="timeline-item"><span class="badge">2018</span><h3>${escapeHTML(r18?.winner?.name||"Data belum tersedia")}</h3><p>${escapeHTML(r18?.sourceNote||"Data belum tersedia")}</p></div><div class="timeline-item"><span class="badge">2022</span><h3>${escapeHTML(r22.winner.name)}</h3><p>${r22.winner.coalition} · ${r22.winner.party}</p><p>Menang · Majoriti ${formatNumber(r22.majority)}</p></div><div class="timeline-item"><span class="badge projection">2026</span><h3>${p.winnerCoalition} · ${p.winnerParty}</h3><p>Unjuran · ${escapeHTML(p.estimatedMajorityLabel)}</p></div></div></article>`}function renderVoteComparison(d){const total=d.result2022.totalTopTwoVotes,cs=[d.result2022.winner,d.result2022.runnerUp].filter(Boolean);return`<article class="card pad"><h2>Keputusan PRN Johor 2022</h2><table class="responsive"><thead><tr><th>Calon</th><th>Parti</th><th>Gabungan</th><th class="num">Undi</th><th class="num">Peratus dua calon utama</th></tr></thead><tbody>${cs.map(c=>`<tr><td data-label="Calon">${escapeHTML(c.name)}</td><td data-label="Parti">${escapeHTML(c.party)}</td><td data-label="Gabungan">${escapeHTML(c.coalition)}</td><td data-label="Undi" class="num">${formatNumber(c.votes)}</td><td data-label="Peratus" class="num">${formatPercentage(calculateTopTwoShare(c.votes,total))}</td></tr>`).join("")}</tbody></table><div class="summary-list"><div class="summary-item"><span>Jumlah undi dua calon utama</span><strong>${formatNumber(total)}</strong></div><div class="summary-item"><span>Majoriti</span><strong>${formatNumber(d.result2022.majority)}</strong></div><div class="summary-item"><span>Status risiko</span><strong>${riskBadge(getRiskLevel(d.result2022.majority))}</strong></div></div><div class="vote-bars">${cs.map(c=>`<div><div class="vote-label"><strong>${escapeHTML(c.name)}</strong><span>${formatNumber(c.votes)} · ${formatPercentage(calculateTopTwoShare(c.votes,total))}</span></div><div class="vote-track"><div class="vote-fill" style="width:${calculateTopTwoShare(c.votes,total)||0}%;--coalition-color:${getCoalitionColor(c.coalition)}"></div></div></div>`).join("")}</div></article>`}function render2026Analysis(d){const f=d.projection2026.keyFactors?.length?d.projection2026.keyFactors:["Kekuatan calon tempatan belum disahkan","Tahap keluar mengundi","Pemindahan undi antara gabungan","Prestasi jentera parti"];return`<article class="card pad"><h2>Outlook PRN Johor 2026</h2><div class="demo-grid"><div class="demo-item"><span>Unjuran pemenang</span><div class="demo-value">${d.projection2026.winnerCoalition} · ${d.projection2026.winnerParty}</div></div><div class="demo-item"><span>Anggaran majoriti</span><div class="demo-value">${escapeHTML(d.projection2026.estimatedMajorityLabel)}</div></div><div class="demo-item"><span>Tahap keyakinan</span><div class="demo-value">${getConfidenceLabel(d.projection2026.confidence)}</div></div><div class="demo-item"><span>Tahap risiko</span><div class="demo-value">${getRiskLabel(d.projection2026.risk)}</div></div></div><p class="kicker">${escapeHTML(d.projection2026.analysis)}</p><h3>Faktor penentu</h3><ul>${f.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>${projectionDisclaimer()}</article>`}function renderCandidateProfiles(d){return`<article class="card pad"><h2>Calon 2026</h2>${d.candidates2026?.length?`<div class="cards">${d.candidates2026.map(c=>`<div class="profile"><h3>${escapeHTML(c.name)}</h3></div>`).join("")}</div>`:createEmptyState("Maklumat calon bagi kawasan ini sedang dikemas kini.")}</article>`}function renderDemographics(d){const x=d.demographics||{},items=[["Jumlah pemilih",formatNumber(x.totalVoters)],["Melayu",formatPercentage(x.malayPct)],["Cina",formatPercentage(x.chinesePct)],["India",formatPercentage(x.indianPct)],["Lain-lain",formatPercentage(x.othersPct)],["Pengundi muda",formatPercentage(x.youthPct)],["Urban",formatPercentage(x.urbanPct)],["Turnout 2018",formatPercentage(x.turnout2018)],["Turnout 2022",Number.isFinite(Number(x.turnout2022))?`${Number(x.turnout2022).toFixed(1)}%`:"Data belum tersedia"]];return`<article class="card pad"><h2>Profil Pengundi</h2><div class="demo-grid">${items.map(i=>`<div class="demo-item"><span>${escapeHTML(i[0])}</span><div class="demo-value">${escapeHTML(i[1])}</div></div>`).join("")}</div></article>`}function renderLocalIssues(d){return`<article class="card pad"><h2>Isu Utama Kawasan</h2>${d.localIssues?.length?"":createEmptyState("Isu tempatan bagi kawasan ini sedang dikemas kini.")}</article>`}function renderPollingDistricts(d){return`<article class="card pad"><h2>Daerah Mengundi dan Lokaliti</h2>${d.pollingDistricts?.length?"":createEmptyState("Maklumat daerah mengundi belum tersedia.")}</article>`}function renderMap(d){return`<article class="card pad"><h2>Peta Kawasan</h2><div id="dunMap" class="empty">${d.mapData?.geojson?"Data GeoJSON tersedia.":"Peta sempadan DUN akan dimasukkan selepas data geospatial disahkan."}</div></article>`}function renderGroundAssessment(d){return`<article class="card pad"><h2>Bacaan Lapangan</h2>${createEmptyState("Belum ada bacaan lapangan yang disahkan.")}</article>`}function renderNews(d){return`<article class="card pad"><h2>Berita Berkaitan DUN</h2>${createEmptyState("Tiada berita berkaitan ditemui.")}</article>`}function renderMediaGallery(d){return`<article class="card pad"><h2>Galeri Kawasan</h2>${createEmptyState("Galeri media bagi kawasan ini sedang dikemas kini.")}</article>`}function renderSources(d){return`<article class="card pad"><h2>Sumber dan Metodologi</h2><ul class="sources">${d.sources.map(s=>`<li><span><strong>${escapeHTML(s.label)}</strong><br><a href="${escapeHTML(s.url)}" target="_blank" rel="noopener noreferrer">${escapeHTML(s.publisher)}</a></span><span class="badge">${escapeHTML(s.type)}</span></li>`).join("")}</ul></article>`}
function setTheme(t){state.theme=t==="dark"?"dark":"light";document.documentElement.dataset.theme=state.theme;localStorage.setItem("jmatrix-theme",state.theme)}function openDunPage(code){location.hash=`dun/${String(code||"").toUpperCase()}`}function handleRoute(){const h=location.hash||"#dashboard";if(h.startsWith("#dun/")){const c=h.replace("#dun/","").toUpperCase(),d=seat(c);if(!d){history.replaceState(null,"","#dashboard");state.route="dashboard";state.selectedDun=null;renderApp();return}state.route="dun";state.selectedDun=c;document.title=`${d.code} ${d.name} — Analisis PRN Johor`;renderApp();return}state.route="dashboard";state.selectedDun=null;document.title="Peta Kuasa PRN Johor — J-MATRIX";renderApp()}function renderApp(){document.getElementById("app").innerHTML=`${nav()}<main id="main" tabindex="-1">${state.route==="dun"?renderDunMicropage(state.selectedDun):renderDashboard()}</main><div id="toast" class="toast" role="status" aria-live="polite"></div>`;setTheme(state.theme)}function rerenderMatrix(){const g=document.getElementById("seat-matrix-grid"),c=document.getElementById("result-count"),s=document.getElementById("selected-summary");if(!g)return;const f=sortDun(filterDun());g.innerHTML=seatCards(f);c.textContent=`${f.length} daripada ${state.data.length} DUN dipaparkan`;s.innerHTML=selectedSummary(f[0])}function bindEvents(){document.addEventListener("click",e=>{const card=e.target.closest("[data-dun-code]");if(card){openDunPage(card.dataset.dunCode);return}const a=e.target.closest("[data-action]")?.dataset.action;if(a==="theme"){setTheme(state.theme==="dark"?"light":"dark");renderApp()}if(a==="print")print();if(a==="copy")copyCurrentLink();if(a==="share")sharePage();if(a==="back")location.hash="dashboard";if(a==="clear"){Object.assign(state,{coalition:"ALL",risk:"ALL",search:"",sort:"CODE"});renderApp()}if(a==="menu"){const m=document.getElementById("nav-actions"),open=m.classList.toggle("open");e.target.setAttribute("aria-expanded",String(open))}});document.addEventListener("change",e=>{if(e.target.matches("[data-year]")){state.year=e.target.dataset.year;renderApp()}if(e.target.matches("[data-coalition]")){state.coalition=e.target.value;renderApp()}if(e.target.matches("[data-risk]")){state.risk=e.target.value;renderApp()}if(e.target.matches("[data-sort]")){state.sort=e.target.value;renderApp()}if(e.target.matches("[data-seat-select]"))openDunPage(e.target.value)});document.addEventListener("input",e=>{if(e.target.matches("[data-search]")){state.search=e.target.value;rerenderMatrix()}})}async function init(){state.theme=localStorage.getItem("jmatrix-theme")||"light";state.data=await loadDunData();const v=validateData(state.data);window.__JMATRIX_VALIDATION__=v;v.warnings.forEach(x=>console.warn(`[DATA VALIDATION] ${x}`));v.errors.forEach(x=>console.error(`[DATA VALIDATION] ${x}`));bindEvents();handleRoute()}window.addEventListener("hashchange",handleRoute);window.addEventListener("DOMContentLoaded",init);</script></body></html>
